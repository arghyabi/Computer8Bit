name: Check MainVersion

on:
  workflow_call:
    inputs:
      base_ref:
        required: true
        type: string

jobs:
  check-main-version:
    name: MainVersion
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Make validation script executable
        run: chmod +x .github/scripts/validate_version.py
      
      - name: Verify MainVersion was updated
        run: |
          python3 .github/scripts/validate_version.py "origin/${{ inputs.base_ref }}" "MainVersion"
