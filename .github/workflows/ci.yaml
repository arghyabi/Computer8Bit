name: CI Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]
  push:
    branches: [master]

jobs:
  # ============================================================================
  # SETUP & ANALYSIS (PR only)
  # ============================================================================
  setup:
    name: Setup and File Analysis
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.changed-files.outputs.changed_files }}
      config_modified: ${{ steps.check-config.outputs.modified }}
      compiler_modified: ${{ steps.analyze.outputs.compiler }}
      emulator_modified: ${{ steps.analyze.outputs.emulator }}
      flasher_modified: ${{ steps.analyze.outputs.flasher }}
      isa_modified: ${{ steps.analyze.outputs.isa }}
      inspector_modified: ${{ steps.analyze.outputs.inspector }}
      sevensegment_modified: ${{ steps.analyze.outputs.sevensegment }}
      document_modified: ${{ steps.analyze.outputs.document }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Check if Config.yaml exists
        run: |
          if [ ! -f "Config.yaml" ]; then
            echo "ERROR: Config.yaml not found!"
            exit 1
          fi
          echo "SUCCESS: Config.yaml found"
      
      - name: Get changed files
        id: changed-files
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Check if Config.yaml modified
        id: check-config
        run: |
          if echo "${{ steps.changed-files.outputs.changed_files }}" | grep -q "Config.yaml"; then
            echo "modified=true" >> $GITHUB_OUTPUT
            echo "SUCCESS: Config.yaml was modified"
          else
            echo "modified=false" >> $GITHUB_OUTPUT
            echo "WARNING: Config.yaml was NOT modified"
          fi
      
      - name: Analyze modified components
        id: analyze
        run: |
          CHANGED_FILES="${{ steps.changed-files.outputs.changed_files }}"
          
          echo "$CHANGED_FILES" | grep -q "^Compiler/" && echo "compiler=true" >> $GITHUB_OUTPUT || echo "compiler=false" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" | grep -q "^Emulator/" && echo "emulator=true" >> $GITHUB_OUTPUT || echo "emulator=false" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" | grep -q "^EepromFlasher/" && echo "flasher=true" >> $GITHUB_OUTPUT || echo "flasher=false" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" | grep -q "^Microcode/Instructions/" && echo "isa=true" >> $GITHUB_OUTPUT || echo "isa=false" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" | grep -q "^Microcode/Verify/\|^Microcode/Inspector/" && echo "inspector=true" >> $GITHUB_OUTPUT || echo "inspector=false" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" | grep -q "^Gen7segDriver/" && echo "sevensegment=true" >> $GITHUB_OUTPUT || echo "sevensegment=false" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" | grep -q "^Docs/\|^Datasheets/\|^Images/\|^README.md" && echo "document=true" >> $GITHUB_OUTPUT || echo "document=false" >> $GITHUB_OUTPUT
  
  # ============================================================================
  # VERSION CHECKS (PR only)
  # ============================================================================
  check-config-modified:
    name: Config.yaml Modified
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: Verify Config.yaml was modified
        run: |
          if [ "${{ needs.setup.outputs.config_modified }}" != "true" ]; then
            echo "ERROR: Config.yaml was not modified in this PR!"
            echo "  EVERY PR must update Config.yaml with new version numbers"
            exit 1
          fi
          echo "SUCCESS: Config.yaml was modified"
  
  check-main-version:
    name: MainVersion
    if: github.event_name == 'pull_request'
    needs: [setup, check-config-modified]
    uses: ./.github/workflows/versionChecks/check-main-version.yaml
    with:
      base_ref: ${{ github.base_ref }}
  
  check-compiler-version:
    name: Compiler Version
    if: github.event_name == 'pull_request'
    needs: [setup, check-config-modified]
    uses: ./.github/workflows/versionChecks/check-compiler-version.yaml
    with:
      component_modified: ${{ needs.setup.outputs.compiler_modified }}
      base_ref: ${{ github.base_ref }}
  
  check-emulator-version:
    name: Emulator Version
    if: github.event_name == 'pull_request'
    needs: [setup, check-config-modified]
    uses: ./.github/workflows/versionChecks/check-emulator-version.yaml
    with:
      component_modified: ${{ needs.setup.outputs.emulator_modified }}
      base_ref: ${{ github.base_ref }}
  
  check-flasher-version:
    name: Flasher Version
    if: github.event_name == 'pull_request'
    needs: [setup, check-config-modified]
    uses: ./.github/workflows/versionChecks/check-flasher-version.yaml
    with:
      component_modified: ${{ needs.setup.outputs.flasher_modified }}
      base_ref: ${{ github.base_ref }}
  
  check-isa-version:
    name: ISA Version
    if: github.event_name == 'pull_request'
    needs: [setup, check-config-modified]
    uses: ./.github/workflows/versionChecks/check-isa-version.yaml
    with:
      component_modified: ${{ needs.setup.outputs.isa_modified }}
      base_ref: ${{ github.base_ref }}
  
  check-inspector-version:
    name: Inspector Version
    if: github.event_name == 'pull_request'
    needs: [setup, check-config-modified]
    uses: ./.github/workflows/versionChecks/check-inspector-version.yaml
    with:
      component_modified: ${{ needs.setup.outputs.inspector_modified }}
      base_ref: ${{ github.base_ref }}
  
  check-sevensegment-version:
    name: 7Segment Version
    if: github.event_name == 'pull_request'
    needs: [setup, check-config-modified]
    uses: ./.github/workflows/versionChecks/check-sevensegment-version.yaml
    with:
      component_modified: ${{ needs.setup.outputs.sevensegment_modified }}
      base_ref: ${{ github.base_ref }}
  
  check-document-version:
    name: Document Version
    if: github.event_name == 'pull_request'
    needs: [setup, check-config-modified]
    uses: ./.github/workflows/versionChecks/check-document-version.yaml
    with:
      component_modified: ${{ needs.setup.outputs.document_modified }}
      base_ref: ${{ github.base_ref }}
  
  validate-format:
    name: Format Validation
    if: github.event_name == 'pull_request'
    needs: setup
    uses: ./.github/workflows/versionChecks/validate-format.yaml
  
  version-summary:
    name: Version Summary
    if: github.event_name == 'pull_request' && always()
    needs: [
      setup,
      check-config-modified,
      check-main-version,
      check-compiler-version,
      check-emulator-version,
      check-flasher-version,
      check-isa-version,
      check-inspector-version,
      check-sevensegment-version,
      check-document-version,
      validate-format
    ]
    uses: ./.github/workflows/versionChecks/version-summary.yaml
  
  # ============================================================================
  # BUILD JOBS (PR and Push)
  # ============================================================================
  build-microcode:
    name: Build Microcode
    uses: ./.github/workflows/buildsChecks/build-microcode.yaml
  
  build-7segment:
    name: Build 7-Segment Driver
    uses: ./.github/workflows/buildsChecks/build-7segment-driver.yaml
  
  build-eeprom-firmware:
    name: Build EEPROM Firmware
    uses: ./.github/workflows/buildsChecks/build-eeprom-firmware.yaml
  
  # ============================================================================
  # FINAL STATUS
  # ============================================================================
  version-check-status:
    name: Version Check Status
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    needs: [
      check-config-modified,
      check-main-version,
      check-compiler-version,
      check-emulator-version,
      check-flasher-version,
      check-isa-version,
      check-inspector-version,
      check-sevensegment-version,
      check-document-version,
      validate-format
    ]
    
    steps:
      - name: Check version validation status
        run: |
          RESULTS=(
            "${{ needs.check-config-modified.result }}"
            "${{ needs.check-main-version.result }}"
            "${{ needs.check-compiler-version.result }}"
            "${{ needs.check-emulator-version.result }}"
            "${{ needs.check-flasher-version.result }}"
            "${{ needs.check-isa-version.result }}"
            "${{ needs.check-inspector-version.result }}"
            "${{ needs.check-sevensegment-version.result }}"
            "${{ needs.check-document-version.result }}"
            "${{ needs.validate-format.result }}"
          )
          
          for result in "${RESULTS[@]}"; do
            if [ "$result" == "failure" ]; then
              echo "ERROR: Some version checks failed!"
              exit 1
            fi
          done
          
          echo "SUCCESS: All version checks passed!"
  
  build-status:
    name: Build Status
    if: always()
    runs-on: ubuntu-latest
    needs: [build-microcode, build-7segment, build-eeprom-firmware]
    
    steps:
      - name: Check build status
        run: |
          RESULTS=(
            "${{ needs.build-microcode.result }}"
            "${{ needs.build-7segment.result }}"
            "${{ needs.build-eeprom-firmware.result }}"
          )
          
          for result in "${RESULTS[@]}"; do
            if [ "$result" == "failure" ]; then
              echo "ERROR: Some builds failed!"
              exit 1
            fi
          done
          
          echo "SUCCESS: All builds passed!"
      
      - name: CI Summary
        run: |
          echo "================================"
          echo "CI Pipeline Summary"
          echo "================================"
          echo "Microcode Build: ${{ needs.build-microcode.result }}"
          echo "7-Segment Build: ${{ needs.build-7segment.result }}"
          echo "EEPROM Firmware Build: ${{ needs.build-eeprom-firmware.result }}"
          echo "================================"
