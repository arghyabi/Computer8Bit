name: Check Compiler Version

on:
  workflow_call:
    inputs:
      component_modified:
        required: true
        type: string
      base_ref:
        required: true
        type: string

jobs:
  check-compiler:
    name: Compiler
    runs-on: ubuntu-latest
    if: inputs.component_modified == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Make validation script executable
        run: chmod +x .github/scripts/validate_version.py
      
      - name: Validate Compiler version
        run: |
          python3 .github/scripts/validate_version.py "origin/${{ inputs.base_ref }}" "Compiler"
