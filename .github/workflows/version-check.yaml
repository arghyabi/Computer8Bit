          PYTHON_SCRIPT
  
  validate-version-format:
    name:  Version Format Valid
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Validate version format
        run: |
          python3 << 'PYTHON_SCRIPT'
          import yaml
          import re
          import sys
          
          with open('Config.yaml', 'r') as f:
              config = yaml.safe_load(f)
          
          version_pattern = re.compile(r'^\d+\.\d+\.\d+\.\d+$')
          errors = []
          
          main_version = config['Version']['MainVersion']
          if not version_pattern.match(main_version):
              errors.append(f"MainVersion '{main_version}' invalid format")
          else:
              print(f"SUCCESS: MainVersion: {main_version}")
          
          for component, version in config['Components'].items():
              if not version_pattern.match(version):
                  errors.append(f"{component} '{version}' invalid format")
              else:
                  print(f"SUCCESS: {component}: {version}")
          
          if errors:
              print("\nERROR: Version format errors:")
              for error in errors:
                  print(f"   {error}")
              print("\nExpected: X.Y.Z.BUILD (e.g., 1.0.0.1074)")
              sys.exit(1)
          
          print("\nSUCCESS: All versions valid")
          PYTHON_SCRIPT
  
  summary:
    name:  Summary
    runs-on: ubuntu-latest
    needs: [
      setup,
      check-config-modified,
      check-main-version,
      check-compiler-version,
      check-emulator-version,
      check-flasher-version,
      check-isa-version,
      check-inspector-version,
      check-sevensegment-version,
      check-document-version,
      validate-version-format
    ]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Display summary
        run: |
          python3 << 'PYTHON_SCRIPT'
          import yaml
          
          with open('Config.yaml', 'r') as f:
              config = yaml.safe_load(f)
          
          print("\n" + "="*60)
          print(" VERSION CHECK SUMMARY")
          print("="*60)
          print(f"\n Main Version: {config['Version']['MainVersion']}")
          print("\n Component Versions:")
          for component, version in config['Components'].items():
              print(f"   {component:12} : {version}")
          print("\nSUCCESS: All version checks completed!")
          print("="*60)
          PYTHON_SCRIPT
      
      - name: Check overall status
        run: |
          RESULTS=(
            "${{ needs.check-config-modified.result }}"
            "${{ needs.check-main-version.result }}"
            "${{ needs.check-compiler-version.result }}"
            "${{ needs.check-emulator-version.result }}"
            "${{ needs.check-flasher-version.result }}"
            "${{ needs.check-isa-version.result }}"
            "${{ needs.check-inspector-version.result }}"
            "${{ needs.check-sevensegment-version.result }}"
            "${{ needs.check-document-version.result }}"
            "${{ needs.validate-version-format.result }}"
          )
          
          for result in "${RESULTS[@]}"; do
            if [ "$result" == "failure" ]; then
              echo "ERROR: Some checks failed!"
              exit 1
            fi
          done
          
          echo "SUCCESS: All checks passed!"
