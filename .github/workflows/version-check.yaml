                  ['git', 'diff', f'origin/{os.environ["GITHUB_BASE_REF"]}', 'HEAD', 'Config.yaml'],
                  text=True
              )
          except subprocess.CalledProcessError as e:
              print(f"ERROR: Error: {e}")
              sys.exit(1)
          
          patterns = ['+  Compiler', '+ Compiler', '+Compiler']
          updated = any(p in version_diff for p in patterns)
          
          if not updated:
              print("ERROR: Compiler files modified but version not updated!")
              sys.exit(1)
          
          with open('Config.yaml', 'r') as f:
              config = yaml.safe_load(f)
          version = config['Components']['Compiler']
          print(f"SUCCESS: Compiler version updated: {version}")
          PYTHON_SCRIPT
  
