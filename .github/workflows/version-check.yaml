name: Version Management Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]

jobs:
  setup:
    name:  Setup and File Analysis
    runs-on: ubuntu-latest
    outputs:
      changed_files: ${{ steps.changed-files.outputs.changed_files }}
      config_modified: ${{ steps.check-config.outputs.modified }}
      compiler_modified: ${{ steps.analyze.outputs.compiler }}
      emulator_modified: ${{ steps.analyze.outputs.emulator }}
      flasher_modified: ${{ steps.analyze.outputs.flasher }}
      isa_modified: ${{ steps.analyze.outputs.isa }}
      inspector_modified: ${{ steps.analyze.outputs.inspector }}
      sevensegment_modified: ${{ steps.analyze.outputs.sevensegment }}
      document_modified: ${{ steps.analyze.outputs.document }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Check if Config.yaml exists
        run: |
          if [ ! -f "Config.yaml" ]; then
            echo "ERROR: Error: Config.yaml not found!"
            exit 1
          fi
          echo "SUCCESS: Config.yaml found"
      
      - name: Get changed files
        id: changed-files
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo " Changed files:"
          echo "$CHANGED_FILES"
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Check if Config.yaml modified
        id: check-config
        run: |
          if echo "${{ steps.changed-files.outputs.changed_files }}" | grep -q "Config.yaml"; then
            echo "modified=true" >> $GITHUB_OUTPUT
            echo "SUCCESS: Config.yaml was modified"
          else
            echo "modified=false" >> $GITHUB_OUTPUT
            echo "WARNING:  Config.yaml was NOT modified"
          fi
      
      - name: Analyze modified components
        id: analyze
        run: |
          CHANGED_FILES="${{ steps.changed-files.outputs.changed_files }}"
          
          # Check each component
          if echo "$CHANGED_FILES" | grep -q "^Compiler/"; then
            echo "compiler=true" >> $GITHUB_OUTPUT
            echo " Compiler modified"
          else
            echo "compiler=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -q "^Emulator/"; then
            echo "emulator=true" >> $GITHUB_OUTPUT
            echo " Emulator modified"
          else
            echo "emulator=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -q "^EepromFlasher/"; then
            echo "flasher=true" >> $GITHUB_OUTPUT
            echo " Flasher modified"
          else
            echo "flasher=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -q "^Microcode/Instructions/"; then
            echo "isa=true" >> $GITHUB_OUTPUT
            echo " ISA modified"
          else
            echo "isa=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -q "^Microcode/Verify/\|^Microcode/Inspector/"; then
            echo "inspector=true" >> $GITHUB_OUTPUT
            echo " Inspector modified"
          else
            echo "inspector=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -q "^Gen7segDriver/"; then
            echo "sevensegment=true" >> $GITHUB_OUTPUT
            echo " 7Segment modified"
          else
            echo "sevensegment=false" >> $GITHUB_OUTPUT
          fi
          
          if echo "$CHANGED_FILES" | grep -q "^Docs/\|^Datasheets/\|^Images/\|^README.md"; then
            echo "document=true" >> $GITHUB_OUTPUT
            echo " Document modified"
          else
            echo "document=false" >> $GITHUB_OUTPUT
          fi
  
  check-config-modified:
    name: Config.yaml Modified
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: Verify Config.yaml was modified
        run: |
          if [ "${{ needs.setup.outputs.config_modified }}" != "true" ]; then
            echo "ERROR: Config.yaml was not modified in this PR!"
            echo "   EVERY PR must update Config.yaml with new version numbers"
            echo ""
            echo "   Required changes:"
            echo "   1. Increment MainVersion (always required)"
            echo "   2. Increment component versions for modified components"
            exit 1
          fi
          echo "SUCCESS: Config.yaml was modified in this PR"
  
  check-main-version:
    name:  MainVersion Updated
    runs-on: ubuntu-latest
    needs: [setup, check-config-modified]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Verify MainVersion was updated
        run: |
          python3 << 'PYTHON_SCRIPT'
          import subprocess
          import sys
          import os
          
          try:
              version_diff = subprocess.check_output(
                  ['git', 'diff', f'origin/{os.environ["GITHUB_BASE_REF"]}', 'HEAD', 'Config.yaml'],
                  text=True
              )
          except subprocess.CalledProcessError as e:
              print(f"ERROR: Error getting git diff: {e}")
              sys.exit(1)
          
          main_version_updated = 'MainVersion' in version_diff and any(
              pattern in version_diff for pattern in ['+  MainVersion:', '+ MainVersion:', '+MainVersion:']
          )
          
          if not main_version_updated:
              print("ERROR: ERROR: MainVersion in Config.yaml was not updated!")
              print("   EVERY PR requires MainVersion to be incremented")
              print("\n   Example: 1.0.0.1074 → 1.0.0.1075")
              sys.exit(1)
          
          print("SUCCESS: MainVersion was updated")
          PYTHON_SCRIPT
  
  check-compiler-version:
    name:  Compiler Version
    runs-on: ubuntu-latest
    needs: [setup, check-config-modified]
    if: needs.setup.outputs.compiler_modified == 'true'
    
    steps:
